<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="signup.css" />
    <title>Titan Signup</title>
  </head>

  <body>
    <form id="userForm" action="submit.php" method="POST">
      <label for="name">Name:</label><br>
      <input type="text" id="name" name="name"><br><br>

      <label for="age">Age</label><br>
      <input type="number" id="age"><br><br>

      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email"><br><br>

      <label for="phone">Phone:</label><br>
      <input type="tel" id="phone" name="phone"><br><br>

      <button type="submit">Send</button>
    </form>

    <div class="border">
      <h1 class = head> Sign Up</h1>
      <h1 class="Text">Create an Account</h1>

      <input
        class="textinput"
        type="text"
        placeholder="Enter username"
      />

      <h2 class="Text">Create a Password</h2>

      <input
        class="textinput2"
        type="password"
        placeholder="Enter password"
      />

      <button
        class="signupbutton"
        type="button"
        onclick="signup()"
      >
        Sign Up
      </button>
    </div>

    <script>
      function signup() {
        var username = document.querySelector(".textinput").value.trim();
        var password = document.querySelector(".textinput2").value;

        if (!username || !password) {
          alert("Please enter both username and password.");
          return;
        }

        // Load previously saved accounts.
        var accounts = JSON.parse(localStorage.getItem("titanAccounts")) || [];

        // Check whether the username already exists.
        var usernameExists = accounts.some(function(account) {
          return account.username.toLowerCase() === username.toLowerCase();
        });

        if (usernameExists) {
          alert("That username is already taken.");
          return;
        }

        // Add the new account.
        accounts.push({
          username: username,
          password: password
        });

        // Save the updated account list.
        localStorage.setItem("titanAccounts", JSON.stringify(accounts));

        // Remember the signed-in user and go to the home page.
        localStorage.setItem("titanCurrentUser", username);
        window.location.href = "../Homeonpage.html/Homeonpage.html";
      }
    </script>
  </body>
</html>
